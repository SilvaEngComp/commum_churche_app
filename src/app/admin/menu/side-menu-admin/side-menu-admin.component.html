<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <div class="div-header">
        <ion-avatar class="left" [ngClass]="{'hasBorder': user?.image}" (click)="setPage(0)">
          <img id="userImage" [src]="user?.image" (error)="standby()" />
        </ion-avatar>
        <ion-note>{{user?.name}}</ion-note>
      </div>

    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding">

    <ion-item lines="none" (click)="setPage(3)" *noPermission="'member'">
      <ion-icon name="grid-sharp"></ion-icon>
      <ion-label>Admin</ion-label>
    </ion-item>

    <ion-item lines="none" (click)="setPage(7)" *ngIf="isTest">
      <ion-icon name="chatbox-ellipses-outline"></ion-icon>
      <ion-label>Fórum</ion-label>
      <ion-badge color="success" *ngIf="badgeFeed">{{badgeFeed}}</ion-badge>
    </ion-item>
    <!--
      <ion-item lines="none" tab="more" (click)="setPage(7)" *ngIf="isTest">
        <ion-icon name="calendar-number-outline"></ion-icon>
        <ion-label>Programações</ion-label>
      </ion-item> -->

    <ion-item lines="none" (click)="setPage(1)">
      <ion-icon name="book-sharp"></ion-icon>
      <ion-label>Leitura</ion-label>
    </ion-item>



    <!-- <ion-item lines="none" tab="more" (click)="setPage(0)">
        <ion-icon name="person-sharp"></ion-icon>
        <ion-label>Perfil</ion-label>
      </ion-item> -->
    <!-- <ion-item lines="none" tab="more" (click)="share()">
        <ion-icon name="gift-outline"></ion-icon>
        <ion-label>Convidar</ion-label>
      </ion-item> -->


    <ion-item lines="none" (click)="setPage(-2)">
      <ion-icon name="power-sharp"></ion-icon>
      <ion-label>Sair</ion-label>
    </ion-item>


    <ion-item lines="none" *ngIf="isTest">
      <ion-icon color="warning" name="logo-apple-ar"></ion-icon>
      <ion-label color="warning">Teste!</ion-label>
    </ion-item>
  </ion-content>
</ion-menu>
<div id="main-content">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>


      <ion-title>{{pageTile | uppercase}}</ion-title>

      <ion-buttons slot="end">
        <ion-avatar (click)="showTutorial($event)">
          <img src="./assets/images/help.png" />
        </ion-avatar>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
</div>
