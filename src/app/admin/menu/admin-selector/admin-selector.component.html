<ion-content ionScroll="true" #main *ngIf="isLarge">
  <app-admin-large></app-admin-large>
</ion-content>

<ion-content ionScroll="true" #mainSmall *ngIf="!isLarge">
  <!-- <ion-item lines="none" (click)="doRefresh($event)">
    <ion-icon name="refresh-outline"></ion-icon>
  </ion-item> -->
  <div [ngSwitch]="page">
    <app-bible-program-admin *ngSwitchCase="'0'" [subpage]="'1'"></app-bible-program-admin>
    <app-user-admin *ngSwitchCase="'1'" [subpage]="'1'"></app-user-admin>
    <app-more *ngSwitchCase="'2'" (returnPage)="onSelectPage($event)"></app-more>
    <app-financy-admin *ngSwitchCase="'3'" [subpage]="'0'" (sessionPage)="onSelectPage($event)"></app-financy-admin>
    <app-financy-admin *ngSwitchCase="'4'" [subpage]="'1'" (sessionPage)="onSelectPage($event)"></app-financy-admin>
    <app-bible-program-admin *ngSwitchCase="'5'"></app-bible-program-admin>
  </div>

</ion-content>
<app-admin-small *ngIf="!isLarge" (selectedPage)="onSelectPage($event)"></app-admin-small>
