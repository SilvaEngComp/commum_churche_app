<app-side-menu-admin (selectedPage)="onSelectPage($event)"></app-side-menu-admin>


<ion-content ionScroll="true" #mainSmall>

  <div [ngSwitch]="page">
    <app-user-admin *ngSwitchCase="'0'" [subpage]="'0'" (sessionPage)="onSelectPage($event)"></app-user-admin>
    <app-bible-program-admin *ngSwitchCase="'1'" [subpage]="'1'"
      (sessionPage)="onSelectPage($event)"></app-bible-program-admin>
    <app-user-admin *ngSwitchCase="'2'" [subpage]="'1'" (sessionPage)="onSelectPage($event)"></app-user-admin>
    <app-more *ngSwitchCase="'3'" (returnPage)="onSelectPage($event)"></app-more>
    <app-financy-admin *ngSwitchCase="'4'" [subpage]="'0'" (sessionPage)="onSelectPage($event)"></app-financy-admin>
    <app-financy-admin *ngSwitchCase="'5'" [subpage]="'1'" (sessionPage)="onSelectPage($event)"></app-financy-admin>
    <app-feed-admin *ngSwitchCase="'6'" [subpage]="'0'" (sessionPage)="onSelectPage($event)"></app-feed-admin>
    <app-feed-admin *ngSwitchCase="'7'" [subpage]="'1'" [editable]="false"
      (sessionPage)="onSelectPage($event)"></app-feed-admin>
    <app-church-schedule *ngSwitchCase="'8'"></app-church-schedule>

  </div>

  <ion-refresher slot="fixed" #ionRefresh (ionRefresh)="doRefresh($event, ionRefresh)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
</ion-content>
