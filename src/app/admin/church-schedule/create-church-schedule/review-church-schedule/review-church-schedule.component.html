<ion-grid>
  <ion-row>
    <ion-col size="3" *ngFor="let scheduleTime of churchSchedule?.scheduleTimes">
      <ion-card>
        <ion-item lines="none">
          <ion-label slot="start">{{scheduleTime?.day}}</ion-label>
          <ion-label slot="end">{{scheduleTime?.time}}</ion-label>
        </ion-item>
      </ion-card>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col *ngIf="churchSchedule?.image">
      <ion-img [src]="churchSchedule?.image"></ion-img>
    </ion-col>
    <ion-col>
      <div class="complete-message">{{ churchSchedule?.message }}</div>
    </ion-col>
  </ion-row>
</ion-grid>
