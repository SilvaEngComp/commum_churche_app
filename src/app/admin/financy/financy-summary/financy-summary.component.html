<ion-item class="item-page-title">
  <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="back()"></ion-icon>
  <ion-title>{{localPageTitle}}</ion-title>
</ion-item>
<ion-grid *ngIf="totalInputOutput">

  <ion-row>
    <ion-col class="card-options">

      <app-my-select-list [color]="'primary'" [label]="'Conta'" [listName]="'wallets'" [obj]="wallet"
        (selectEmiter)="setWallet($event)"></app-my-select-list>
      <ion-item lines="none">
        <ion-button id="select-date" expand="block" color="primary">
          <ion-label>De {{initialDate | date: 'dd/MM/yyyy'}} até {{endDate | date: 'dd/MM/yyyy'}}</ion-label>
        </ion-button>

        <ion-popover trigger="select-date" #ionPopoverFilterDate>
          <ng-template>
            <ion-content>
              <ion-grid>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Inicial</ion-label>
                      <ion-input type="date" [value]="initialDate" #InputInitialDate
                        (ionChange)="setIntialDate(InputInitialDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Final</ion-label>

                      <ion-input type="date" [value]="endDate" #inputEndDate
                        (ionChange)="setEndDate(inputEndDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                </ion-row>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none">
                      <ion-button (click)="selectDateInterval(ionPopoverFilterDate)" color="primary" expand="block">
                        <ion-label>Filtrar</ion-label>
                      </ion-button>
                    </ion-item>
                  </ion-col>
                </ion-row>
              </ion-grid>
            </ion-content>
          </ng-template>
        </ion-popover>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>
      <div class="balance">
        <ion-label class="balance-label">Saldo em Conta</ion-label>
        <ion-label class="balance-value">{{balance | currencyBrl}}</ion-label>
      </div>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>

      <ion-button fill="clear" color="primary" (click)="download()">
        <ion-icon color="primary" slot="end" name="cloud-download-outline"></ion-icon>
      </ion-button>
    </ion-col>
  </ion-row>
  <ion-row>

    <ion-col class="card-options">
      <div class="input-output-div" (click)="goToBalance()">
        <ion-icon color="success" name="arrow-up-circle-sharp"></ion-icon>
        <div>
          <ion-label class="balance-label">Receitas</ion-label><br>
          <ion-label color="success" class="balance-value">{{totalInputOutput?.totalInput | currencyBrl}}</ion-label>
        </div>
      </div>
    </ion-col>
    <ion-col class="card-options">
      <div class="input-output-div" (click)="goToExpence()">
        <ion-icon color="danger" name="arrow-up-circle-sharp"></ion-icon>
        <div>
          <ion-label class="balance-label">Saídas</ion-label><br>
          <ion-label color="danger" class="balance-value">{{totalInputOutput?.totalOutput | currencyBrl}}</ion-label>
        </div>
      </div>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col class="card-options">
      <ion-img alt="Igreaja Batista Nova Betel" src="./assets/images/tithes-admin.png"
        (click)="openMenuOption(1,true)"></ion-img>
    </ion-col>

    <ion-col class="card-options">
      <ion-img alt="Igreaja Batista Nova Betel" src="./assets/images/offers-admin.png"
        (click)="openMenuOption(1,false)"></ion-img>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col class="card-options">
      <ion-img alt="Igreaja Batista Nova Betel" src="./assets/images/inputs-admin.png"
        (click)="openMenuOption(0,true)"></ion-img>
    </ion-col>
    <ion-col class="card-options">
      <ion-img alt="Igreaja Batista Nova Betel" src="./assets/images/outputs-admin.png"
        (click)="openMenuOption(0,false)"></ion-img>
    </ion-col>
  </ion-row>

</ion-grid>
