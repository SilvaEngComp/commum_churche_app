<div class="table-responsive" *ngFor="let caixaSummary of caixaReport?.caixaReportCategory?.caixaSummary">
  <table class="table  align-middle ">
    <thead>
      <tr class="table-dark">
        <th colspan="5" *ngIf="caixaSummary?.caixaCategory"><ion-label
            class="label-title">{{caixaSummary?.caixaCategory?.name}}</ion-label>
        </th>
        <th *ngIf="caixaSummary?.caixaCategory"><ion-label class="label-title">R$ {{caixaSummary?.total |
            currencyBrl}}</ion-label>
        </th>
        <th colspan="6" *ngIf="!caixaSummary?.caixaCategory"><ion-label class="label-title">
            <ion-label>Sem
              Categoria</ion-label></ion-label>
        </th>
      </tr>
      <tr>
        <th *ngFor="let item of headCaixaList">{{item | uppercase}}</th>
      </tr>
    </thead>
    <tbody class="table-group-divider">
      <tr *ngFor="let item of caixaSummary?.caixas">

        <td>
          <ion-label class="label-body">{{item?.amount | currencyBrl}}</ion-label>
        </td>
        <td>
          <ion-label class="label-body">{{item?.date | date:'dd/MM/YYYY'}}</ion-label>
        </td>
        <td>
          <ion-label class="label-body">{{item?.register?.name | uppercase}}</ion-label>
        </td>
        <td>
          <ion-label class="label-body">{{item?.caixaType?.name | uppercase}}</ion-label>
        </td>
        <td>

          <div class="buttons">

            <ion-tab-button [disabled]="!item?.description" (click)="openDescription(item)">
              <ion-icon name="document-text-outline"></ion-icon>
              <ion-label>Descrição</ion-label>
            </ion-tab-button>
            <ion-tab-button [disabled]="!item?.file" (click)="download(item)" [download]="item?.file">
              <ion-icon name="download-outline"></ion-icon>
              <ion-label>Comprovante</ion-label>
            </ion-tab-button>
            <ion-tab-button (click)="edit(item)">
              <ion-icon name="create-outline"></ion-icon>
              <ion-label>Editar</ion-label>
            </ion-tab-button>
            <ion-tab-button (click)="delete(item)">
              <ion-icon name="trash-outline"></ion-icon>
              <ion-label>Excluir</ion-label>
            </ion-tab-button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
