<ion-item class="item-page-title">
  <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="back()"></ion-icon>
  <ion-title>{{localPageTitle}}</ion-title>
</ion-item>
<ion-grid>
  <ion-row>
    <ion-col>
      <ion-item class="filter-date">
        <ion-button id="select-date" expand="block" color="primary">
          <ion-label>De {{initialDate | date: 'dd/MM/yyyy'}} até {{endDate | date: 'dd/MM/yyyy'}}</ion-label>
        </ion-button>

        <ion-popover trigger="select-date" #ionPopoverFilterDate>
          <ng-template>
            <ion-content>
              <ion-grid>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Inicial</ion-label>
                      <ion-input type="date" [value]="initialDate" #InputInitialDate
                        (ionChange)="setIntialDate(InputInitialDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Final</ion-label>

                      <ion-input type="date" [value]="endDate" #inputEndDate
                        (ionChange)="setEndDate(inputEndDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                </ion-row>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none">
                      <ion-button (click)="selectDateInterval(ionPopoverFilterDate)" color="primary" expand="block">
                        <ion-label>Filtrar</ion-label>
                      </ion-button>
                    </ion-item>
                  </ion-col>
                </ion-row>
              </ion-grid>
            </ion-content>
          </ng-template>
        </ion-popover>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>
      <ion-accordion-group>
        <ion-accordion value="first">
          <ion-item slot="header" color="light">
            <ion-card-title color="primary">Saídas</ion-card-title>
            <ion-note color="primary" slot="end">R$ {{outputSummary?.total | currencyBrl}}</ion-note>
          </ion-item>
          <div class="ion-padding" slot="content">
            <ion-item lines="none" *ngIf="sumary?.caixaSummary?.output.length===0 ">
              <ion-title color="primary"> {{noContent}}</ion-title>
            </ion-item>
            <div *ngFor="let caixa of sumary?.caixaSummary?.output">
              <app-caixa-summary [caixaSummary]="caixa" [isEntry]="false" *ngIf="sumary?.caixaSummary?.output.length>0"
                (mantainceEmiter)="receiveMantainceEmiter($event)"></app-caixa-summary>
            </div>
          </div>
        </ion-accordion>
      </ion-accordion-group>
    </ion-col>
  </ion-row>
</ion-grid>
