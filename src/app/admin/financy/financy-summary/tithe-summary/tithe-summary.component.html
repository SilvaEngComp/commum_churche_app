<ion-card>
  <ion-grid>
    <ion-row *ngFor="let item of titheSummary?.tithes">
      <ion-col>
        <ion-item lines="none">
          <ion-icon *ngIf="!item?.showDetails" name="caret-forward-outline"
            (click)="setShowTitheDetail(item)"></ion-icon>
          <ion-icon *ngIf="item?.showDetails" name="caret-down-outline" (click)="setShowTitheDetail(item)"></ion-icon>

          <ion-card-title>R$ {{item?.amount | currencyBrl}}</ion-card-title>
          <ion-note slot="end">{{item?.isTithe ? 'DÍZIMO':'OFERTA'}}</ion-note>
        </ion-item>
      </ion-col>

      <div [ngClass]="{'ocult-details': !item?.showDetails, 'show-details':item?.showDetails}">
        <table class="responsive-table highlight centered">
          <thead>
            <tr>
              <th *ngFor="let item of headTitheList">{{item}}</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <ion-label>{{ titheSummary?.user?.name}}</ion-label>
              </td>
              <td>
                <ion-label> {{ item?.customizedMonth?.name }}/{{item?.year}} </ion-label>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </ion-row>


  </ion-grid>
</ion-card>
