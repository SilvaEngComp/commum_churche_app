<ion-card>
  <table class="responsive-table highlight centered">
    <thead>
      <tr>
        <th *ngFor="let header of headTitheList">{{header | uppercase}}</th>
      </tr>
    </thead>
    <tbody *ngFor="let item of titheSummary?.tithes">
      <tr>
        <td>
          <ion-label>R$ {{item?.amount | currencyBrl}}</ion-label>
        </td>
        <td>
          <ion-label>R$ {{item?.created_at | date:'dd/MM/yyyy'}}</ion-label>
        </td>

        <td>
          <ion-label>{{ item?.user?.name}}</ion-label>
        </td>
        <td>
          <ion-label> {{ item?.customizedMonth?.name }}/{{item?.year}} </ion-label>
        </td>
        <td>
          <ion-label>{{ item?.register?.name}}</ion-label>
        </td>
      </tr>
    </tbody>
  </table>
</ion-card>
