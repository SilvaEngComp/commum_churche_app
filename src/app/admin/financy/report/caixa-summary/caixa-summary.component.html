<ion-grid>
  <ion-row>
    <ion-col>
      <ion-item lines="none">
        <ion-icon *ngIf="!caixaSummary?.showDetails" name="caret-forward-outline"
          (click)="setShowSummaryDetail(caixaSummary)"></ion-icon>
        <ion-icon *ngIf="caixaSummary?.showDetails" name="caret-down-outline"
          (click)="setShowSummaryDetail(caixaSummary)"></ion-icon>

        <ion-card-title>{{ caixaSummary?.caixaType?.name}} </ion-card-title>
        <ion-note slot="end">R$ {{caixaSummary?.total | currencyBrl}}</ion-note>
      </ion-item>

      <div [ngClass]="{'ocult-details': !caixaSummary?.showDetails, 'show-details':caixaSummary?.showDetails}">
        <ion-card>
          <ion-grid>
            <ion-row *ngFor="let item of caixaSummary?.caixas">
              <ion-col>
                <ion-item lines="none">
                  <ion-icon *ngIf="!item?.showDetails" name="caret-forward-outline"
                    (click)="setShowCaixaDetail(item, caixaSummary)"></ion-icon>
                  <ion-icon *ngIf="item?.showDetails" name="caret-down-outline"
                    (click)="setShowCaixaDetail(item, caixaSummary)"></ion-icon>

                  <ion-card-title>R$ {{item?.amount | currencyBrl}}</ion-card-title>
                  <ion-note slot="end">{{item?.date | date:'dd/MM/YYYY'}}</ion-note>
                </ion-item>
              </ion-col>

              <div [ngClass]="{'ocult-details': !item?.showDetails, 'show-details':item?.showDetails}">
                <table class="responsive-table highlight centered">
                  <thead>
                    <tr>
                      <th *ngFor="let item of headCaixaList">{{item}}</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>
                        <ion-label>{{item?.user?.name}}</ion-label>
                      </td>
                      <td>
                        <ion-label> {{item?.isEntry? 'Entrada':'Saída'}}</ion-label>
                      </td>
                      <td>
                        <ion-label> {{item?.reason?item?.reason:' - '}}</ion-label>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </ion-row>


          </ion-grid>
        </ion-card>
      </div>
    </ion-col>
  </ion-row>
</ion-grid>
