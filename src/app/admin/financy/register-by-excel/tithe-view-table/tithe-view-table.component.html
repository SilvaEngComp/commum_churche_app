<div class="table-responsive">
  <table class="table  align-middle table-sm">
    <thead>
      <tr class="table-dark">
        <th *ngFor="let header of headTitheList">{{header | uppercase}}</th>
      </tr>
    </thead>
    <tbody class="table-group-divider">
      <tr *ngFor="let item of datas" [ngClass]="{'color-problem': item?.problems?.length>0}">
        <td>
          <div class="buttons">
            <ion-tab-button (click)="delete(item)">
              <ion-icon name="trash-outline"></ion-icon>
              <ion-label>Excluir</ion-label>
            </ion-tab-button>
          </div>
        </td>
        <td>
          <ion-label>R$ {{item?.amount | currencyBrl}}</ion-label>
        </td>
        <td>
          <ion-label>{{item?.date | date:'dd/MM/yyyy'}}</ion-label>
        </td>
        <td>
          <ion-label>{{ item?.user?.name}}</ion-label>
        </td>
        <td>
          <ion-label *ngFor="let problem of item?.problems">{{ problem}}</ion-label><br>
        </td>
      </tr>
    </tbody>
  </table>
</div>
