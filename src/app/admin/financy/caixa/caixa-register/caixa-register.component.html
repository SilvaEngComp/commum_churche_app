<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start" (click)="back()">
      <ion-icon name="arrow-undo-sharp"></ion-icon>
    </ion-buttons>
    <ion-item class="header" lines="none">
      <ion-label color="light">REGISTRAR ENTRADA/SAÍDA</ion-label>
    </ion-item>
  </ion-toolbar>
</ion-header>

<ion-grid>
  <ion-row>
    <ion-col>

      <ion-item lines="none" class="input">
        <ion-label>Valor: R$</ion-label>
        <ion-input type="text" #inputAmount placeholder="Digite o valor"
          [brmasker]="{money: true, thousand: '.',  decimalCaracter: ','}">
        </ion-input>
      </ion-item>


      <ion-item lines="none" class="input" *ngIf="!caixa?.isEntry">
        <ion-label>Justificativa</ion-label>
        <ion-textarea type="text" #inputAmount placeholder="Descreva o motivo da retirada">
        </ion-textarea>
      </ion-item>

      <ion-item lines="none" [ngClass]="{'input': !isSmallDevice, 'input-small':isSmallDevice}">
        <ion-radio-group (click)="setIsEntry($event)" [value]="caixa?.isEntry" [allowEmptySelection]="false">
          <ion-item lines="none">
            <ion-label>Entrada</ion-label>
            <ion-radio slot="start" value="1"></ion-radio>
          </ion-item>

          <ion-item lines="none">
            <ion-label>Saída</ion-label>
            <ion-radio slot="start" value="0"></ion-radio>
          </ion-item>
        </ion-radio-group>
      </ion-item>


      <ion-item lines="none" class="separated-date">
        <ion-item>
          <label>{{day}}</label>
        </ion-item>
        <ion-item lines="none" [ngClass]="{'large-input-date ': !isSmallDevice, 'small-input-date':isSmallDevice}">
          <ion-button fill="clear" (click)="openDay($event)" expand="full">
            <label>Dia: {{day}}</label>
          </ion-button>

        </ion-item>
        <ion-item lines="none" class="right-input-date ">
          <ion-button fill="clear" id="popover-button-month" expand="block">
            <label>Mês/Ano: {{monthYear | date: 'MM/yyyy'}}</label>
          </ion-button>

          <ion-popover trigger="popover-button-month" [dismissOnSelect]="false">
            <ng-template>
              <ion-content>
                <ion-datetime [showDefaultButtons]="true" presentation="month-year" display-format="MM-YYYY" #timeMonth
                  (ionChange)="onSelectMonth(timeMonth.value)" doneText="OK" cancelText="CANCELAR">
                </ion-datetime>
              </ion-content>
            </ng-template>
          </ion-popover>
        </ion-item>
      </ion-item>


    </ion-col>
  </ion-row>
</ion-grid>


<ion-footer [translucent]="true">
  <ion-toolbar>
    <ion-button expand="block" color="medium" (click)="register(inputAmount.value)">REGISTRAR</ion-button>
  </ion-toolbar>
</ion-footer>
