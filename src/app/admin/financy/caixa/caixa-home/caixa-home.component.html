<ion-grid>
  <ion-row>
    <ion-col>
      <ion-card>
        <ion-card-title>DÍZIMOS</ion-card-title>
        <ion-card-subtitle>R$ {{sumary?.titheSummary?.total | currencyBrl}}</ion-card-subtitle>
      </ion-card>
    </ion-col>

    <ion-col>
      <ion-card>
        <ion-card-title>OFERTAS</ion-card-title>
        <ion-card-subtitle>R$ {{sumary?.offerSummary?.total | currencyBrl}}</ion-card-subtitle>
      </ion-card>
    </ion-col>


    <ion-col *ngFor="let caixa of sumary?.caixaSummary">
      <ion-card>
        <ion-card-title>{{caixa?.caixaType?.name | uppercase}}</ion-card-title>
        <ion-card-subtitle>R$ {{caixa?.total | currencyBrl}}</ion-card-subtitle>
      </ion-card>
    </ion-col>
  </ion-row>
</ion-grid>
