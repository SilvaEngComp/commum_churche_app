<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-item lines="none" class="input">
          <ion-label position="floating">*Nome: </ion-label>
          <ion-input autofocus="true" (keyup.enter)="register()" type="text" [(ngModel)]="caixaCategory.name"
            #name="ngModel" name="caixacategoryName" [ngModelOptions]="{standalone: true}" required></ion-input>
          <ion-note *ngIf="!name?.valid && name?.touched" color="danger">Este campo é obrigatório</ion-note>
        </ion-item>


      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
<ion-footer [translucent]="true">
  <ion-toolbar>
    <ion-item lines="none">
      <ion-button color="success" (click)="register()">
        <ion-label>CONFIRMAR</ion-label>
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-footer>
