<ion-item class="item-page-title">
  <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="back()"></ion-icon>
  <ion-title>{{localPageTitle}}</ion-title>
</ion-item>
<ion-grid>
  <ion-row>
    <ion-col>

      <ion-item lines="none" class="input">
        <ion-label position="floating">Valor: R$</ion-label>
        <ion-input type="text" maxlength="15" #inputAmount placeholder="Digite o valor" [value]="value"
          [brmasker]="{money: true, thousand: '.',  decimalCaracter: ','}">
        </ion-input>
      </ion-item>
    </ion-col>
    <ion-col>
      <ion-item lines="none" class="right-input-date">

        <ion-button fill="clear" id="popover-button-month" expand="block">
          <label>{{customizedMonth?.name}}/{{year}}</label>
        </ion-button>

        <ion-popover trigger="popover-button-month" [dismissOnSelect]="false">
          <ng-template>
            <ion-content>
              <ion-datetime [showDefaultButtons]="true" presentation="month-year" display-format="MM-YYYY" #timeMonth
                (click)="onSelectMonth(timeMonth.value)" doneText="OK" cancelText="CANCELAR">
              </ion-datetime>
            </ion-content>
          </ng-template>
        </ion-popover>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col *permission="'financial'">
      <app-my-select-list [label]="'Usuarios'" [listName]="'users'" [create]="true"
        (selectEmiter)="setUser($event)"></app-my-select-list>
    </ion-col>
    <ion-col>
      <ion-button expand="block" color="success" (click)="register(inputAmount.value)">{{isNew ?
        'REGISTRAR':'ALTERAR'}}</ion-button>
    </ion-col>
  </ion-row>
</ion-grid>
