<ion-item class="item-page-title">
  <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="back()"></ion-icon>
  <ion-title>{{localPageTitle}}</ion-title>
</ion-item>
<ion-grid>
  <ion-row>
    <ion-col class="card-options">

      <app-my-select-list [color]="'primary'" [label]="'Conta'" [listName]="'wallets'" [obj]="wallet"
        (selectEmiter)="setWallet($event)"></app-my-select-list>
      <ion-item lines="none">
        <ion-button id="select-date" expand="block" color="primary">
          <ion-label>De {{initialDate | date: 'dd/MM/yyyy'}} até {{endDate | date: 'dd/MM/yyyy'}}</ion-label>
        </ion-button>

        <ion-popover trigger="select-date" #ionPopoverFilterDate>
          <ng-template>
            <ion-content>
              <ion-grid>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Inicial</ion-label>
                      <ion-input type="date" [value]="initialDate" #InputInitialDate
                        (ionChange)="setIntialDate(InputInitialDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                  <ion-col>
                    <ion-item lines="none" class="input">
                      <ion-label position="floating">Data Final</ion-label>

                      <ion-input type="date" [value]="endDate" #inputEndDate
                        (ionChange)="setEndDate(inputEndDate.value)"></ion-input>
                    </ion-item>
                  </ion-col>
                </ion-row>
                <ion-row>
                  <ion-col>
                    <ion-item lines="none">
                      <ion-button (click)="selectDateInterval(ionPopoverFilterDate)" color="primary" expand="block">
                        <ion-label>Filtrar</ion-label>
                      </ion-button>
                    </ion-item>
                  </ion-col>
                </ion-row>
              </ion-grid>
            </ion-content>
          </ng-template>
        </ion-popover>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>

      <div class="card-options" (click)="download()">
        <ion-icon class="report-graph" color="primary" name="cloud-download-outline"></ion-icon>
        <ion-label class="balance-label">Relatórios</ion-label>
      </div>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col class="card-options">
      <ion-card class="div-canvas">
        <ion-card-content>
          <app-general-summary-graph></app-general-summary-graph>
        </ion-card-content>
      </ion-card>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col class="card-options">
      <ion-card class="div-canvas">
        <ion-card-header>
          <ion-title>Resumo de Entradas Por Organização</ion-title>
        </ion-card-header>
        <ion-card-content>
          <app-inputs-graph></app-inputs-graph>
        </ion-card-content>
      </ion-card>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col class="card-options">
      <ion-card class="div-canvas">
        <ion-card-header>
          <ion-title>Resumo de Saídas Por Organização</ion-title>
        </ion-card-header>
        <ion-card-content>
          <app-outputs-graph></app-outputs-graph>
        </ion-card-content>
      </ion-card>
    </ion-col>
  </ion-row>

</ion-grid>
