<div class="geral" [ngStyle]="{'height': height}">
  <!-- <div class="div-header">
        <ion-label class="lb-title">
            MAIS
        </ion-label>
    </div> -->

  <div class="div-body">
    <ion-grid>
      <ion-row>
        <ion-col offset="4">
          <ion-avatar class="myAvatar">
            <ion-img [src]="user?.image"></ion-img>

          </ion-avatar>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col offset="1">
          <ion-label class="title-name">{{ user?.name }}</ion-label>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-button *ngIf="user" expand="block" class="btn-perfil" (click)="selectOption(0)">
            <ion-label>VER PERFIL</ion-label>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>


  <div class="div-body" *permission="'member'">
    <ion-list lines="none">
      <ion-item (click)="share()">
        <ion-icon name="people-sharp" color="secondary"></ion-icon>
        <ion-label>CONVIDAR UM AMIGO</ion-label>
      </ion-item>
    </ion-list>
    <ion-item lines="none" (click)="selectOption(1)" class="option">
      <ion-icon name="extension-puzzle-outline" color="secondary"></ion-icon>
      <ion-label>LEITURA BÍBLICA</ion-label>
    </ion-item>

    <!-- <ion-item lines="none" (click)="selectOption(4)" class="option" *noPermission="'financial'">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Dízimos e Ofertas</ion-label>
    </ion-item> -->
  </div>
  <div class="div-body" *permission="'financial'">
    <div>
      <ion-label class="lb-title">
        FINANCEIRO
      </ion-label>
    </div>

    <ion-item lines="none" (click)="selectOption(5)" class="option">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Resumo Financeiro</ion-label>
    </ion-item>
  </div>
  <div class="div-body" *permission="'secretary'">
    <div>
      <ion-label class="lb-title">
        MEMBROS
      </ion-label>
    </div>
    <ion-item lines="none" (click)="selectOption(2)" class="option">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Consultar</ion-label>
    </ion-item>
  </div>
  <div class="div-body">
    <!-- <div>
      <ion-label class="lb-title">
        OPÇÕES
      </ion-label>
    </div>  -->
    <!-- <ion-item lines="none" (click)="selectOption(100)">
      <ion-icon name="lock-closed-outline" color="primary"></ion-icon>
      <ion-label> Política de Privacidade</ion-label>
    </ion-item> -->
    <ion-item lines="none" color="light" (click)="selectOption(-2)">
      <ion-icon name="power-outline" color="secondary"></ion-icon>
      <ion-label> Sair</ion-label>
    </ion-item>


  </div>

</div>
