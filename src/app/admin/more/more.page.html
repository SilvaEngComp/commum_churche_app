<div class="geral">
  <!-- <div class="div-header">
        <ion-label class="lb-title">
            MAIS
        </ion-label>
    </div> -->

  <div class="div-body">
    <ion-grid>
      <ion-row>
        <ion-col offset="4">
          <ion-avatar class="myAvatar">
            <ion-img [src]="base_url + user?.image"></ion-img>

          </ion-avatar>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col offset="1">
          <ion-label class="title-name">{{ user?.name }}</ion-label>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <ion-button *ngIf="user" expand="block" class="btn-perfil" (click)="selectOption(-1)">
            <ion-label>VER PERFIL</ion-label>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="div-body" *permission="'secretary'">
    <div>
      <ion-label class="lb-title">
        CONVIDAR
      </ion-label>
    </div>
    <ion-list lines="none">
      <ion-item (click)="showInvitation()">
        <ion-icon name="add-circle-outline" color="tertiary"></ion-icon>
        <ion-label>Enviar Convite</ion-label>
      </ion-item>
      <ion-item *ngIf="is_invitting">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" #inputInvitation (keyup.enter)="sendInvitation(inputInvitation.value)"></ion-input>
        <ion-button slot="end" (click)="sendInvitation(inputInvitation.value)" fill="clear">Enviar</ion-button>
      </ion-item>
    </ion-list>
  </div>

  <div class="div-body" *permission="'member'">
    <div>
      <ion-label class="lb-title">
        LEITURA BÍBLICA
      </ion-label>
    </div>
    <ion-item lines="none" (click)="selectOption(0)" class="option">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Programa de leitura</ion-label>
    </ion-item>
  </div>
  <div class="div-body">
    <div>
      <ion-label class="lb-title">
        FINANCEIRO
      </ion-label>
    </div>
    <ion-item lines="none" (click)="selectOption(4)" class="option">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Dízimos e Ofertas</ion-label>
    </ion-item>
    <ion-item lines="none" (click)="selectOption(5)" class="option" *permission="'financial'">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Resumo Financeiro</ion-label>
    </ion-item>
  </div>
  <div class="div-body" *permission="'secretary'">
    <div>
      <ion-label class="lb-title">
        MEMBROS
      </ion-label>
    </div>
    <ion-item lines="none" (click)="selectOption(1)" class="option">
      <ion-icon name="extension-puzzle-outline"></ion-icon>
      <ion-label>Consultar</ion-label>
    </ion-item>
  </div>
  <div class="div-body">
    <div>
      <ion-label class="lb-title">
        OPÇÕES
      </ion-label>
    </div>
    <!-- <ion-item lines="none" (click)="selectOption(100)">
      <ion-icon name="lock-closed-outline" color="primary"></ion-icon>
      <ion-label> Política de Privacidade</ion-label>
    </ion-item> -->
    <ion-item lines="none" (click)="selectOption(-2)">
      <ion-icon src="./assets/icons/exit.svg" color="primary"></ion-icon>
      <ion-label> Sair</ion-label>
    </ion-item>


  </div>

</div>
