<div [ngSwitch]="subpage">
  <app-user-register *ngSwitchCase="'2'" (sessionPage)="onReceiveSession($event)"></app-user-register>
  <app-user *ngSwitchCase="'1'" (sessionPage)="onReceiveSession($event)"></app-user>
  <app-profile *ngSwitchCase="'0'" (returnPage)="onReceiveSession($event)"></app-profile>
</div>
