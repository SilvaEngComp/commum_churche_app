<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-item lines="none" class="input">
          <ion-label position="floating">*Nome Completo: </ion-label>
          <ion-input type="text" [(ngModel)]="user.name" #name="ngModel" name="userName"
            [ngModelOptions]="{standalone: true}" required></ion-input>
          <ion-note *ngIf="!name?.valid && name?.touched" color="danger">Este campo é obrigatório</ion-note>
        </ion-item>


        <ion-item lines="none" class="input">
          <ion-label>*Organização </ion-label>
          <ion-select [value]="user?.church?.id" interface="popover" (ionChange)="setChurch($event)">
            <ion-select-option [value]="item?.id" *ngFor="let item of churches">{{item?.name | uppercase}}
            </ion-select-option>
          </ion-select>
        </ion-item>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
<ion-footer>
  <ion-item lines="none">
    <ion-button color="success" (click)="register()">
      <ion-label>CONFIRMAR</ion-label>
    </ion-button>
  </ion-item>

</ion-footer>
