<div class="geral">


    <div class="div-header">
        <div class="div-back">
            <ion-button fill="clear" (click)="back()">
                <ion-icon (click)="back()" slot="start" name="arrow-back-outline" color="dark"></ion-icon>
            </ion-button>
            <ion-label slot="end" class="lb-title" *ngIf="!feed?.id">
                NOVA PUBLICAÇÃO
            </ion-label>
            <ion-label slot="end" class="lb-title" *ngIf="feed?.id">
                EDITAR PUBLICAÇÃO
            </ion-label>
        </div>


        <ion-item lines="none" (click)="publish(true)" button>
            <ion-label *ngIf="feed?.id">Publicar</ion-label>
        </ion-item>

    </div>


    <ion-spinner *ngIf="is_loading" name="bubbles"></ion-spinner>
    <div class="div-body" *ngIf="!is_loading">
        <ion-grid>
            <ion-row>
                <ion-col>
                    <div class="div-publish">
                        <ion-avatar>
                            <ion-img [src]="base_url + publisher?.image"></ion-img>
                        </ion-avatar>
                        <ion-label>{{ publisher?.name }} </ion-label>
                    </div>
                </ion-col>
                <!-- <ion-col *ngIf="feed?.id">
                    <ion-list class="online-class">
                        <ion-item lines="none">
                            <ion-label>Aula online</ion-label>
                        </ion-item>
                        <ion-item lines="none">
                            <ion-toggle [checked]="feed?.onlineClass" slot="end" (click)="onlineClass(togglePublish)" #togglePublish></ion-toggle>
                        </ion-item>
                    </ion-list>
                </ion-col> -->
            </ion-row>
            <ion-row *ngIf="feed?.id">
                <ion-col>
                    <ion-item>
                        <ion-label position="floating">Data</ion-label>
                        <span title="data atual" slot="end">
                        <ion-icon slot="end" name="calendar-outline" (click)="setDateAsNow()"></ion-icon></span>
                        <ion-input [value]="feed?.date|date:'dd/MM/yyyy'" type="text" placeholder="dd/mm/aaaa" (keyup)="setDate(inputDate.value)" #inputDate [brmasker]="{mask:'00/00/0000', type:'num'}"></ion-input>
                    </ion-item>
                </ion-col>
                <ion-col>
                    <ion-item>
                        <ion-label position="floating">Hora</ion-label>
                        <span title="horário atual" slot="end">
                        <ion-icon  name="time-outline" (click)="setTimeAsNow()"></ion-icon>
                       </span>
                        <ion-input [value]="feed?.time" type="text" placeholder="HH:MM" (keyup)="setTime(inputTime.value)" #inputTime [brmasker]="{mask:'00:00', type:'num'}"></ion-input>
                    </ion-item>
                </ion-col>

            </ion-row>
            <ion-row>
                <ion-col>
                    <ion-item>
                        <ion-label position="floating">Título</ion-label>
                        <ion-input [value]="feed?.title" (keyup)="onTypeTitle(inputTitle.value)" #inputTitle placeholder="Digite o título da publicação" type="text"></ion-input>
                        <ion-button fill="clear" slot="end" name="send-sharp" (click)="publish()" button *ngIf="!feed?.id">Próximo</ion-button>
                    </ion-item>
                </ion-col>
            </ion-row>
            <ion-row *ngIf="feed?.id">
                <ion-col>
                    <ion-item class="item-img" lines="none" *ngIf="feed?.image">
                        <ion-img [src]="base_url + feed?.image"></ion-img>

                    </ion-item>

                    <ion-item>
                        <ion-label position="floating">Menssagem</ion-label>
                        <ion-textarea (keyup)="onTypeMessage($event)" cols="10" rows="10" placeholder="O que você está fazendo? Conta pra gente!" [(ngModel)]="feed.message"></ion-textarea>
                    </ion-item>
                    <ion-note>{{ feed?.message?.length ? feed?.message?.length : 0}} / 10000 caracteres</ion-note>

                </ion-col>
            </ion-row>
            <ion-row>
                <ion-col>
                    <ion-button (click)="addImage()" *ngIf="feed?.id">
                        <ion-icon name="image-outline"></ion-icon>

                    </ion-button>
                </ion-col>
            </ion-row>

        </ion-grid>
    </div>

</div>
