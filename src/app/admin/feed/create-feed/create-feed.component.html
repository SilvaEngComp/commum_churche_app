<ion-item class="item-page-title">
  <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="back()"></ion-icon>
  <ion-title>{{localPageTitle}}</ion-title>
</ion-item>

<div class="segment">
  <ion-segment-button value="1" [ngClass]="{'selected-segment': session==='1'}">
    <ion-label>Texto</ion-label>
  </ion-segment-button>
  <ion-label color="secondary">|</ion-label>
  <ion-segment-button value="2" [ngClass]="{'selected-segment': session==='2', 'left':true}">
    <ion-label>Imagem</ion-label>
  </ion-segment-button>
  <ion-label color="secondary">|</ion-label>
  <ion-segment-button value="3" [ngClass]="{'selected-segment': session==='3'}">
    <ion-label>Agendar</ion-label>
  </ion-segment-button>
</div>

<div *ngIf="is_loading" class="progress_bar_waitting_redirect">
  <ion-spinner name="dots"></ion-spinner>

  <ion-label>Aguarde um instante</ion-label>

  <ion-spinner name="dots"></ion-spinner>
</div>
<ion-grid *ngIf="!is_loading">
  <ion-row>
    <ion-col *ngIf="session==='1'">
      <ion-card>
        <app-edit-text-feed (returnSubpage)="receiveSubpage($event)"></app-edit-text-feed>
      </ion-card>
    </ion-col>
    <ion-col *ngIf="session==='2'">
      <app-load-images [single]="true" [selectedImge]="feed?.image"
        (returnPage)="receiveSubpage($event)"></app-load-images>
    </ion-col>
    <ion-col *ngIf="session==='3'">
      <ion-card>
        <app-review-feed (returnSubpage)="receiveSubpage($event)"></app-review-feed>
      </ion-card>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col *ngIf="session!=='1'">
      <ion-button expand="block" (click)="backSession()">
        <ion-icon name="chevron-back-outline"></ion-icon>

        <ion-label>VOLTAR</ion-label>
      </ion-button>
    </ion-col>

    <ion-col>
      <ion-button expand="block" (click)="nextSession()">
        <ion-label>{{session!=='3' ?'PRÓXIMO':'CONCLUIR'}} </ion-label>
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </ion-col>
  </ion-row>

</ion-grid>
