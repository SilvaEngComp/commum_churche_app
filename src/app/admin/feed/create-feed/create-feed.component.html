<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start" (click)="back()">
      <ion-icon color="primary" name="arrow-undo-circle-outline"></ion-icon>
    </ion-buttons>
    <ion-title class="lb-title">
      {{!feed?.id? 'NOVA PUBLICAÇÃO': 'EDITAR PUBLICAÇÃO'}}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-spinner *ngIf="is_loading" name="bubbles"></ion-spinner>
<div class="div-body" *ngIf="!is_loading">
  <ion-grid>

    <ion-row *ngIf="feed?.id">
      <ion-col>
        <ion-item>
          <ion-label position="floating">Data</ion-label>
          <span title="data atual" slot="end">
            <ion-icon slot="end" name="calendar-outline" (click)="setDateAsNow()"></ion-icon></span>
          <ion-input [value]="feed?.date|date:'dd/MM/yyyy'" type="text" placeholder="dd/mm/aaaa"
            (keyup)="setDate(inputDate.value)" #inputDate [brmasker]="{mask:'00/00/0000', type:'num'}"></ion-input>
        </ion-item>
      </ion-col>
      <ion-col>
        <ion-item>
          <ion-label position="floating">Hora</ion-label>
          <span title="horário atual" slot="end">
            <ion-icon name="time-outline" (click)="setTimeAsNow()"></ion-icon>
          </span>
          <ion-input [value]="feed?.time" type="text" placeholder="HH:MM" (keyup)="setTime(inputTime.value)" #inputTime
            [brmasker]="{mask:'00:00', type:'num'}"></ion-input>
        </ion-item>
      </ion-col>

    </ion-row>
    <ion-row>
      <ion-col>
        <div class="div-input-title">
          <ion-item>
            <ion-label position="floating">Título</ion-label>
            <ion-input placeholder="Digite o título da publicação" [value]="feed?.title"
              (keyup)="onTypeTitle(inputTitle.value)" #inputTitle placeholder="Digite o título da publicação"
              type="text"></ion-input>

          </ion-item>
          <ion-button fill="clear" name="send-sharp" (click)="publish()" *ngIf="!feed?.id">
            <ion-label>PRÓXIMO</ion-label>
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </ion-button>
        </div>
      </ion-col>
      <ion-col *ngIf="feed?.id">
        <ion-item lines="none" (click)="publish(true)" button>
          <ion-label>Publicar</ion-label>
        </ion-item>
      </ion-col>
    </ion-row>
    <ion-row *ngIf="feed?.id">
      <ion-col>
        <ion-item class="item-img" lines="none" *ngIf="feed?.image">
          <ion-img [src]="base_url + feed?.image"></ion-img>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Menssagem</ion-label>
          <ion-textarea (keyup)="onTypeMessage($event)" cols="10" rows="10"
            placeholder="O que você está fazendo? Conta pra gente!" [(ngModel)]="feed.message"></ion-textarea>
        </ion-item>
        <ion-note>{{ feed?.message?.length ? feed?.message?.length : 0}} / 10000 caracteres</ion-note>

      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-button (click)="addImage()" *ngIf="feed?.id">
          <ion-icon name="image-outline"></ion-icon>

        </ion-button>
      </ion-col>
    </ion-row>

  </ion-grid>
