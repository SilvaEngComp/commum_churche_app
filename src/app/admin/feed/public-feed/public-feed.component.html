<ion-header>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-icon name="add-circle-outline" (click)="newFeed()" *permission="'multimidia'"></ion-icon>
    </ion-buttons>
  </ion-toolbar>
</ion-header>





<div *ngIf="!is_loading" class="div-body">
  <app-publication *ngFor="let feed of feeds" [feed]="feed" (returnSubPage)="returnSubPage($event)"></app-publication>
</div>
