<div *ngIf="isLoading" class="spinner">
  <ion-spinner name="dots"></ion-spinner>
  <ion-label>Carregando</ion-label>
  <ion-spinner name="dots"></ion-spinner>
</div>

<ion-grid *ngIf="!isLoading">
  <ion-row *ngIf="!showSelect">
    <ion-col>
      <div class="flex-container main-label" lines="none" button (click)="setShowSelect()">
        <ion-label color="light">{{label | uppercase}}</ion-label>
        <ion-label color="light"> {{selected}}</ion-label>
        <ion-icon color="light" name="caret-down-outline"></ion-icon>
      </div>
    </ion-col>
  </ion-row>
  <ion-row *ngIf="showSelect">
    <ion-col class="flex-container backgroun-list">

      <div>
        <div class="button-controls flex-container">
          <ion-icon color="primary" name="chevron-back-circle-sharp" (click)="setShowSelect()"></ion-icon>
          <div *ngIf="create" class="right flex-container">
            <ion-icon (click)="createNew($event)" color="primary" name="add-circle-outline"></ion-icon>
            <ion-label>Novo</ion-label>
          </div>
        </div>

        <ion-input autofocus="true" type="text" placeholder="Pesquisar" #inputSearchValue
          (keyup)="searchBar(inputSearchValue.value)">
        </ion-input>
        <div class="open-div">
          <ion-label *ngIf="filtredSearch?.length===0">Lista vazia</ion-label>
          <ol>
            <li *ngFor="let item of filtredSearch">
              <ion-label detail (click)="onSelect(item)" class="item-search"
                [ngClass]="{'selected': selected===item?.value}">
                {{ item?.value | uppercase}}</ion-label>
            </li>
          </ol>

        </div>
      </div>
    </ion-col>
  </ion-row>
</ion-grid>
