<div *ngIf="isLoading" class="spinner">
  <ion-spinner name="dots"></ion-spinner>
  <ion-label>Carregando</ion-label>
  <ion-spinner name="dots"></ion-spinner>
</div>

<ion-grid *ngIf="!isLoading">
  <ion-row *ngIf="!showSelect">
    <ion-col>
      <ion-item class="input" lines="none" button (click)="setShowSelect()">
        <ion-label slot="start">{{label | uppercase}}</ion-label>
        <ion-label slot="end">{{selected}}</ion-label>
        <ion-icon slot="end" name="caret-down-outline"></ion-icon>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row *ngIf="showSelect" color="light">
    <ion-col>
      <ion-item lines="none">
        <ion-button fill="clear" (click)="setShowSelect()">
          <ion-label>Fehar</ion-label>
          <ion-icon name="close-circle-outline"></ion-icon>
        </ion-button>

        <ion-button slot="end" fill="clear" (click)="createNew($event)" *ngIf="create">
          <ion-icon slot="start" color="primary" name="add-circle-outline"></ion-icon>
          <ion-label slot="end">Novo</ion-label>
        </ion-button>

      </ion-item>
      <ion-item [ngClass]="{'ocult': filtredSearch?.length>0}">
        <ion-label>Lista vazia</ion-label>
      </ion-item>
      <ion-grid *ngIf="filtredSearch?.length>0">
        <ion-row>
          <ion-col>
            <ion-item lines="none" class="input">
              <ion-label position="floating">PESQUISAR {{label | uppercase}}</ion-label>
              <ion-input autofocus="true" type="text" placeholder="Digite o nome" #inputSearchValue
                (keyup)="searchBar(inputSearchValue.value)">
              </ion-input>
            </ion-item>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-list class="open-div">
              <ion-item lines="none" detail (click)="onSelect(item)" class="item-search"
                *ngFor="let item of filtredSearch">
                {{ item?.value | uppercase}}</ion-item>
            </ion-list>

          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-col>
  </ion-row>
</ion-grid>
