<ion-grid>
  <ion-row>
    <ion-col>
      <ion-item lines="none" class="input">
        <ion-label position="floating">*Nome Completo: </ion-label>
        <ion-input (ionBlur)="save()" type="text" [(ngModel)]="user.name" #name="ngModel" name="userName"
          [ngModelOptions]="{standalone: true}" required></ion-input>
        <ion-note *ngIf="!name?.valid && name?.touched" color="danger">Este campo é obrigatório</ion-note>

      </ion-item>


      <ion-item lines="none" class="input">
        <ion-label position="floating">*Celular: </ion-label>
        <ion-input (ionBlur)="save()" type="text" [brmasker]="{phone: true, type:'num'}"
          [(ngModel)]="user.contact.phone1" [ngModelOptions]="{standalone: true}" required #name="ngModel" name="phone">
        </ion-input>
        <ion-note *ngIf="!name?.valid && name?.touched" color="danger">Este campo é obrigatório</ion-note>
      </ion-item>


      <ion-item lines="none" class="input">
        <ion-label>*Data Nascimento: </ion-label>
        <ion-input (ionBlur)="save()" type="date" [max]="today" [(ngModel)]="user.birthDate" #name="ngModel"
          name="birthdate" [ngModelOptions]="{standalone: true}" required></ion-input>
        <ion-note *ngIf="!name?.valid && name?.touched" color="danger">Este campo é obrigatório</ion-note>
      </ion-item>

      <ion-item lines="none" class="input">
        <ion-label position="floating">Profissão </ion-label>
        <ion-input (ionBlur)="save()" placeholder="Com o que trabalha (Opcional)" type="text"
          [(ngModel)]="user.occupation"></ion-input>
      </ion-item>


      <!-- <ion-item lines="none" class="input"> -->


      <!-- <ion-item>
          <ion-note>Não</ion-note>
          <ion-toggle (ionBlur)="save()" slot="end" [(ngModel)]="user.isBaptized"></ion-toggle>
        </ion-item>
        <ion-note>Sim</ion-note>
      </ion-item> -->
      <ion-item lines="none" class="input">
        <ion-label>*Já é Batizado? </ion-label>
      </ion-item>
      <ion-item lines="none" class="input">
        {{user?.isBaptized}}
        <ion-radio-group (click)="setIsBaptized($event)" [value]="user?.isBaptized" [allowEmptySelection]="false">
          <ion-item lines="none">
            <ion-label>Não</ion-label>
            <ion-radio slot="start" value="0"></ion-radio>
          </ion-item>

          <ion-item lines="none">
            <ion-label>Sim</ion-label>
            <ion-radio slot="start" value="1"></ion-radio>
          </ion-item>
        </ion-radio-group>
      </ion-item>

      <ion-item class="input">
        <ion-label>*Qual seu estado civil? </ion-label>
        <ion-select [value]="user.maritalStatus.id" interface="popover" (ionChange)="setMaritalStatus($event)">
          <ion-select-option [value]="item?.id" *ngFor="let item of maritalStatuses">{{item?.name}}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="input">
        <ion-label>*Como veio para a igreja? </ion-label>
        <ion-select [value]="user?.inputMethod?.id" interface="popover" (ionChange)="setInputMethod($event)">
          <ion-select-option [value]="item?.id" *ngFor="let item of inputMethods">{{item?.name}}</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="item-button" lines="none">
        <ion-button slot="end" color="secondary" type="submit" (click)="setSession(2)">
          <ion-label>PRÓXIMO</ion-label>
        </ion-button>
      </ion-item>
    </ion-col>
  </ion-row>
</ion-grid>
