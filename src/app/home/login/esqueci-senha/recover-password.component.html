<div class="fundo"></div>
<ion-grid>
  <ion-row>
    <ion-col>
      <ion-item class="item-input" lines="none">
        <ion-label position="floating">E-mail</ion-label>
        <ion-input type="email" (keyup.enter)="sendRequest()" [(ngModel)]="email"></ion-input>
      </ion-item>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col>
      <ion-item lines="none">
        <ion-button class="btn-entrar" color="tertiary" (click)="backPage()">VOLTAR</ion-button>
        <ion-button class="btn-entrar" color="tertiary" (click)="sendRequest()">ENVIAR</ion-button>
      </ion-item>
    </ion-col>
  </ion-row>
</ion-grid>
