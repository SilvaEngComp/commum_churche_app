<div class="flex-container">
  <div class="fundo flex-container">
    <div class="buttons">
      <ion-button fill="outline" color="light" (click)="backPage()">
        <ion-label>Voltar</ion-label>
      </ion-button>
      <ion-button color="light" (click)="sendCode()">
        <ion-label>Enviar</ion-label>
      </ion-button>
    </div>
  </div>


  <ion-grid>
    <ion-row>
      <ion-col>
        <ion-img alt="Igreaja Batista Nova Betel" class="logo" src="./assets/images/logo.png"></ion-img>
      </ion-col>
    </ion-row> <ion-row>
      <ion-col>
        <ion-label>
          DIGITE O
          CÓDIGO QUE VOCÊ
          RECEBEU NO E-MAIL
        </ion-label>
      </ion-col>
    </ion-row>
    <ion-row *ngIf="cod.length===6">
      <ion-col>
        <ion-progress-bar value="0.25" buffer="0.5"></ion-progress-bar>
      </ion-col>
    </ion-row>
    <ion-row *ngIf="cod.length<6">
      <ion-col class="input-code">
        <ion-input #inputZero type="text" [value]="cod2[0]" maxlength="6" #input1
          (keyup)="checkCod(0, $event,input1,input2)"></ion-input>

        <ion-input type="text" [value]="cod2[1]" maxlength="1" #input2
          (keyup)="checkCod(1, $event,input2, input3)"></ion-input>

        <ion-input type="text" [value]="cod2[2]" maxlength="1" #input3
          (keyup)="checkCod(2, $event,input3, input4)"></ion-input>

        <ion-input type="text" [value]="cod2[3]" maxlength="1" #input4
          (keyup)="checkCod(3, $event,input4, input5)"></ion-input>

        <ion-input type="text" [value]="cod2[4]" maxlength="1" #input5
          (keyup)="checkCod(4, $event,input5, input6)"></ion-input>

        <ion-input type="text" [value]="cod2[5]" maxlength="6" #input6
          (keyup)="checkCod(5, $event,input6, input6)"></ion-input>

      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col offset="4" class="forgot-password">
        <ion-label color="light" class="link" (click)="resendEmail()">Re-enviar email</ion-label>
      </ion-col>
    </ion-row>
  </ion-grid>

</div>
