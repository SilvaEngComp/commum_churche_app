<ion-menu #menuSide contentId="main-content" swipe-gesture="true">
  <ion-header>
    <ion-toolbar>
      <ion-img src="./assets/images/logo.png"></ion-img>
    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding">
    <ion-list color="secondary">
      <ion-item lines="none" tab="home" (click)="setPage(1)">
        <ion-icon name="home-sharp"></ion-icon>
        <ion-label>CADASTRO</ion-label>
      </ion-item>
      <ion-item lines="none" tab="more" (click)="share()">
        <ion-icon name="gift-outline"></ion-icon>
        <ion-label>Convidar</ion-label>
      </ion-item>

      <ion-item lines="none" tab="register" (click)="setPage(2)" *ngIf="isTest">
        <ion-icon name="balloon-sharp"></ion-icon>
        <ion-label>Aniversariantes</ion-label>
      </ion-item>

      <ion-item lines="none" tab="login" (click)="setPage(3)">
        <ion-icon name="person-circle"></ion-icon>
        <ion-label>Login</ion-label>
      </ion-item>



      <ion-item lines="none" tab="login" (click)="setPage(-1)" *ngIf="showInstall">
        <ion-icon name="cloud-download-outline"></ion-icon>
        <ion-label>Instalar</ion-label>
      </ion-item>

      <ion-item lines="none" tab="test" *ngIf="isTest">
        <ion-icon color="warning" name="logo-apple-ar"></ion-icon>
        <ion-label color="warning">Teste!</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
<div id="main-content">
  <ion-header>
    <ion-toolbar color="primary">
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>


      <ion-title>{{pageTile | uppercase}}</ion-title>

    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding"> Tap the button in the toolbar to open the menu. </ion-content>
</div>
