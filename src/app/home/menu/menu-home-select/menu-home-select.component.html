<ion-content ionScroll="true" #main *ngIf="isLarge">
  <app-menu-home-large></app-menu-home-large>
</ion-content>

<ion-content *ngIf="!isLarge">
  <app-home-user-register *ngIf="page===0"></app-home-user-register>
  <app-login *ngIf="page===1"></app-login>
</ion-content>
<app-menu-home-small *ngIf="!isLarge" (selectedPage)="onSelectPage($event)"></app-menu-home-small>
